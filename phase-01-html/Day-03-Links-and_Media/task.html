<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Gallery</title>
</head>

<body>

    <!-- Navigation Section -->
    <nav>
        <a href="#nature">প্রকৃতি</a> |

<!-- Section 3-->
 <section id="food">

 </section>

    <!--Section 4-->
